<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShinYerim UX/UI Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        object,
        iframe {
            display: block;
            width: 100%;
            height: 100vh;
            border: none;
        }

        .fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            font-size: 16px;
        }

        .fallback a {
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <object data="portfolio/ShinYerim_UXUI.pdf" type="application/pdf">
        <iframe src="portfolio/ShinYerim_UXUI.pdf">
            <div class="fallback">
                <a href="portfolio/ShinYerim_UXUI.pdf" download>PDF 다운로드</a>
            </div>
        </iframe>
    </object>
</body>

</html>
